<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — EduKar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>.form-group { margin-bottom:12px; }</style>
</head>
<body style="padding-top:72px;">

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">
            <div class="navbar__logo-icon"><i class="fas fa-graduation-cap"></i></div>
            EduKar
        </a>
        <ul class="navbar__links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/#features">Features</a></li>
            <li><a href="/#how-it-works">How It Works</a></li>
            <li><a href="/#testimonials">Reviews</a></li>
            <li><a href="/#faq">FAQ</a></li>
            <li><a href="/#contact">Contact</a></li>
        </ul>
        <div class="navbar__actions">
            <a href="login" class="btn btn--outline btn--sm" id="navLoginBtn">Login</a>
            <a href="register" class="btn btn--primary btn--sm" id="navRegBtn">Get Started</a>
        </div>
        <button class="navbar__hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    </div>
</nav>

<div style="min-height:calc(100vh - 72px); display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 50%, #F0F9FF 100%); padding:20px;">
    <div style="background:#fff; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,.08); padding:32px 28px; width:100%; max-width:420px;">
        <h1 style="text-align:center; font-size:22px; font-weight:900; color:#0F172A; margin-bottom:4px;">Create Account</h1>
        <p style="text-align:center; font-size:14px; color:#64748B; margin-bottom:16px;">Start your education journey today</p>
        <form id="regForm">
            <div class="form-group"><label><i class="fas fa-user" style="color:#2E8B57; margin-right:4px;"></i> Full Name</label><input type="text" class="form-input" id="name" placeholder="Your full name" required></div>
            <div class="form-group"><label><i class="fas fa-envelope" style="color:#2E8B57; margin-right:4px;"></i> Email</label><input type="email" class="form-input" id="email" placeholder="you@email.com" required></div>
            <div class="form-group"><label><i class="fas fa-phone" style="color:#2E8B57; margin-right:4px;"></i> Phone (Optional)</label><input type="tel" class="form-input" id="phone" placeholder="+92 300 1234567"></div>
            <div class="form-group"><label><i class="fas fa-lock" style="color:#2E8B57; margin-right:4px;"></i> Password</label><input type="password" class="form-input" id="password" placeholder="Min 6 characters" required minlength="6"></div>
            <div class="form-group"><label><i class="fas fa-lock" style="color:#2E8B57; margin-right:4px;"></i> Confirm Password</label><input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required></div>
            <button type="submit" class="btn btn--primary btn--full" id="regBtn" style="padding:12px; font-size:14px;"><i class="fas fa-user-plus"></i> Create Account</button>
        </form>
        <p style="text-align:center; margin-top:16px; font-size:13px; color:#64748B;">
            Already have an account? <a href="login" style="font-weight:700; color:#2E8B57;">Sign In</a>
        </p>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    // Navbar scroll + hamburger
    window.addEventListener('scroll', function() { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50); });
    document.getElementById('hamburger').addEventListener('click', function() {
        var links = document.getElementById('navLinks');
        links.classList.toggle('open');
        this.innerHTML = links.classList.contains('open') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
    });
</script>
<script src="js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EduKar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Comprehensive SEO Meta Tags for EduKar -->
    <meta name="description" content="EduKar is Pakistan's premier education portal. Find top universities, discover fully-funded scholarships, and track your admission applications seamlessly in one place.">
    <meta name="keywords" content="EduKar, Edukar Pakistan, scholarships in Pakistan, top universities in Pakistan, higher education, online admission portal, apply for university, study in Pakistan, education platform, best scholarship portal, admission 2026, EduKar admission, student portal">
    <meta name="author" content="EduKar Platform">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="EduKar | Top Universities & Scholarships in Pakistan">
    <meta property="og:description" content="EduKar is your ultimate gateway to top universities and fully-funded scholarships. Apply online and track your applications securely.">
    <meta property="og:site_name" content="EduKar">
    
    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EduKar | Top Universities & Scholarships">
    <meta name="twitter:description" content="Your ultimate gateway to top universities and scholarships. Apply online and track applications.">


    <!-- Instant redirect for already-logged-in users (runs BEFORE body renders) -->
    <script>
        if (localStorage.getItem('st_token')) {
            document.documentElement.style.display = 'none';
            window.location.replace('home.html');
        }
    </script>
</head>
<body style="padding-top:72px;">

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">
            <div class="navbar__logo-icon"><i class="fas fa-graduation-cap"></i></div>
            EduKar
        </a>
        <ul class="navbar__links" id="navLinks">
            <li><a href="/">Home</a></li>
            <li><a href="/#features">Features</a></li>
            <li><a href="/#how-it-works">How It Works</a></li>
            <li><a href="/#testimonials">Reviews</a></li>
            <li><a href="/#faq">FAQ</a></li>
            <li><a href="/#contact">Contact</a></li>
        </ul>
        <div class="navbar__actions">
            <a href="login.html" class="btn btn--outline btn--sm" id="navLoginBtn">Login</a>
            <a href="register.html" class="btn btn--primary btn--sm" id="navRegBtn">Get Started</a>
        </div>
        <button class="navbar__hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
    </div>
</nav>

<div style="min-height:calc(100vh - 72px); display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #F0FDF4 0%, #ECFDF5 50%, #F0F9FF 100%); padding:20px;">
    <div style="background:#fff; border-radius:20px; box-shadow:0 10px 40px rgba(0,0,0,.08); padding:36px 32px; width:100%; max-width:400px;">
        <h1 style="text-align:center; font-size:22px; font-weight:900; color:#0F172A; margin-bottom:4px;">Welcome Back</h1>
        <p style="text-align:center; font-size:14px; color:#64748B; margin-bottom:20px;">Sign in to your account</p>
        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label><i class="fas fa-envelope" style="color:#2E8B57; margin-right:4px;"></i> Email</label>
                <input type="email" class="form-input" id="email" placeholder="you@email.com" required autocomplete="off" name="login_email_field">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="color:#2E8B57; margin-right:4px;"></i> Password</label>
                <input type="password" class="form-input" id="password" placeholder="Enter password" required autocomplete="new-password" name="login_password_field">
            </div>
            <button type="submit" class="btn btn--primary btn--full" id="loginBtn" style="padding:12px; font-size:14px;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:13px; color:#64748B;">
            Don't have an account? <a href="register.html" style="font-weight:700; color:#2E8B57;">Create Account</a>
        </p>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    // Navbar scroll + hamburger
    window.addEventListener('scroll', function() { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50); });
    document.getElementById('hamburger').addEventListener('click', function() {
        var links = document.getElementById('navLinks');
        links.classList.toggle('open');
        this.innerHTML = links.classList.contains('open') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
    });
</script>
<script src="js/login.js"></script>
</body>
</html>
